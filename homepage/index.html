<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cub Scout Pack 149 — Austin, Texas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* === DESIGN TOKENS === */
    :root {
      --navy: #003f87;
      --gold: #ffc72c;
      --gold-dark: #e5b020;
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray-text: #555555;
      --max-width: 1100px;
    }

    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; color: #222; line-height: 1.6; }
    a { text-decoration: none; }
    img { display: block; max-width: 100%; }
    ul { list-style: none; }

    /* === NAVBAR === */
    .navbar {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
    .nav-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--white);
    }
    .nav-logo img { border-radius: 4px; }
    .nav-brand {
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      line-height: 1.3;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .nav-brand strong { font-size: 1.05rem; color: var(--gold); display: block; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }
    .nav-links a {
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.45rem 0.7rem;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.12); }
    .nav-links a.nav-cta {
      background: var(--gold);
      color: var(--navy);
      font-weight: 600;
      padding: 0.5rem 1rem;
      margin-left: 0.5rem;
    }
    .nav-links a.nav-cta:hover { background: var(--gold-dark); }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
    }
    .nav-links a:focus-visible,
    .hamburger:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* === HERO === */
    .hero {
      position: relative;
      min-height: 540px;
      background: url('https://placehold.co/1200x600/1a3a6b/1a3a6b') center/cover no-repeat;
      display: flex;
      align-items: center;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,40,100,0.88) 40%, rgba(0,40,100,0.45));
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      padding: 5rem 1.5rem;
    }
    .hero-content h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.75rem, 7vw, 5.5rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.0;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .hero-content p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.88);
      max-width: 460px;
      margin-bottom: 2.25rem;
    }
    .btn-primary {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.9rem 2.25rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--gold-dark); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" aria-label="Main navigation">
    <div class="nav-container">
      <a href="#" target="_parent" class="nav-logo">
        <img src="https://placehold.co/50x50/ffc72c/003f87?text=149" alt="Pack 149 Logo" width="50" height="50">
        <span class="nav-brand">CUB SCOUT<br><strong>PACK 149</strong><br><small>AUSTIN, TEXAS</small></span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="#" target="_parent">Home</a></li>
        <li><a href="/about" target="_parent">About</a></li>
        <li><a href="/programs" target="_parent">Programs</a></li>
        <li><a href="/calendar" target="_parent">Calendar</a></li>
        <li><a href="/join" target="_parent">Join</a></li>
        <li><a href="/contact" target="_parent">Contact</a></li>
        <li><a href="/join" target="_parent" class="nav-cta">JOIN PACK 149</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>ADVENTURE<br>STARTS HERE</h1>
      <p>Building confident, kind, and prepared young people</p>
      <a href="/join" target="_parent" class="btn-primary">JOIN PACK 149 ›</a>
    </div>
  </section>

  <!-- VALUE PROPS -->
  <!-- ABOUT -->
  <!-- EVENTS -->
  <!-- FOOTER -->

  <script>

  </script>
</body>
</html>
